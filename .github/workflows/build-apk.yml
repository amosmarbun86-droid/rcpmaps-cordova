name: Build Cordova APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project structure
      run: |
        mkdir www_backup
        cp index.html www_backup/
        cordova create build_dir com.rcpdroid.maps RcpMaps
        cp config.xml build_dir/
        rm -rf build_dir/www/*
        cp www_backup/index.html build_dir/www/
        
    - name: Add Android Platform
      run: |
        cd build_dir
        cordova platform add android

    - name: Build Android APK (Debug)
      run: |
        cd build_dir
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RcpMaps-Debug-APK
        path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
