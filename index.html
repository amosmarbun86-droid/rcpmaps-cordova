<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RcpMaps - Global Fake GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f4f6f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { color: #333; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; font-weight: bold; color: #333; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        button { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-search { background: #2196F3; color: white; width: 100%; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(33,150,243,0.3); }
        .btn-start { background: #4CAF50; color: white; box-shadow: 0 2px 5px rgba(76,175,80,0.3); }
        .btn-stop { background: #F44336; color: white; box-shadow: 0 2px 5px rgba(244,67,54,0.3); }
        button:active { opacity: 0.8; transform: scale(0.98); }
        #map { width: 100%; height: 320px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .status { margin-top: 12px; font-size: 14px; color: #666; font-weight: bold; padding: 5px; border-radius: 4px; background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>RcpMaps</h2>
    
    <input type="text" id="search-input" placeholder="Ketik nama tempat (contoh: Tarutung)...">
    <button class="btn-search" onclick="cariTempat()">CARI TEMPAT</button>
    
    <input type="text" id="latitude" placeholder="Latitude" readonly>
    <input type="text" id="longitude" placeholder="Longitude" readonly>
    
    <div class="btn-group">
        <button class="btn-start" onclick="startFakeGPS()">START FAKE GPS</button>
        <button class="btn-stop" onclick="stopFakeGPS()">STOP</button>
    </div>
    
    <div class="status" id="status-text">Status: GPS Asli (Mati)</div>
    <div id="map"></div>
</div>

<script src="cordova.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker;
    let mockLat = 0;
    let mockLng = 0;

    // Inisialisasi Peta Leaflet awal (Default Jakarta)
    function initMap() {
        map = L.map('map').setView([-6.2088, 106.8456], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        marker = L.marker([-6.2088, 106.8456]).addTo(map);
    }
    window.onload = initMap;

    // Fungsi otomatis mendeteksi koordinat berdasarkan teks pencarian Amos
    async function cariTempat() {
        const query = document.getElementById('search-input').value;
        if (!query) return alert('Ketik nama tempat terlebih dahulu, Amos!');
        
        document.getElementById('status-text').innerText = "Sedang mencari lokasi...";
        document.getElementById('status-text').style.background = "#FFF3CD";
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            if (data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                
                document.getElementById('latitude').value = lat;
                document.getElementById('longitude').value = lon;
                
                map.setView([lat, lon], 15);
                marker.setLatLng([lat, lon]);
                document.getElementById('status-text').innerText = "Lokasi ditemukan! Siap diaktifkan.";
                document.getElementById('status-text').style.background = "#D4EDDA";
            } else {
                alert('Tempat tidak ditemukan, coba nama kota/jalan lain!');
                document.getElementById('status-text').innerText = "Gagal menemukan lokasi.";
                document.getElementById('status-text').style.background = "#F8D7DA";
            }
        } catch (error) {
            console.error(error);
            document.getElementById('status-text').innerText = "Error koneksi pencarian.";
        }
    }

    // Fungsi Utama: Mengunci dan Menyuntikkan GPS palsu ke sistem Android
    function startFakeGPS() {
        const latInput = document.getElementById('latitude').value;
        const lngInput = document.getElementById('longitude').value;
        
        if (!latInput || !lngInput) {
            alert('Cari tempat dulu agar koordinat terisi otomatis!');
            return;
        }

        mockLat = parseFloat(latInput);
        mockLng = parseFloat(lngInput);

        // 1. Geser Pin Marker & Peta internal aplikasi
        map.setView([mockLat, mockLng], 15);
        marker.setLatLng([mockLat, mockLng]);
        
        // 2. Tembus ke sistem Global Android via Native Bridge Plugin
        if (window.cordova && cordova.plugins && cordova.plugins.mockLocation) {
            let opts = {
                provider: "gps",
                latitude: mockLat,
                longitude: mockLng
            };
            
            cordova.plugins.mockLocation.setMockLocation(opts)
            .then((location) => {
                document.getElementById('status-text').style.color = "#FFFFFF";
                document.getElementById('status-text').style.background = "#28A745";
                document.getElementById('status-text').innerText = "Status: GLOBAL FAKE GPS AKTIF!";
                alert("Sukses! Lokasi seluruh HP berhasil dialihkan.");
            })
            .catch((error) => {
                alert("Gagal menyuntik sistem. Pastikan RcpMaps sudah dipilih di menu Opsi Pengembang HP!");
                console.error(error);
            });
        } else {
            // Backup jika dicoba lewat Browser komputer
            navigator.geolocation.getCurrentPosition = function(success) {
                success({ coords: { latitude: mockLat, longitude: mockLng, accuracy: 10 }, timestamp: Date.now() });
            };
            document.getElementById('status-text').innerText = "Status: Fake GPS Aktif (Hanya internal browser)";
            alert("Aplikasi tidak mendeteksi Cordova. Berjalan dalam mode browser.");
        }
    }

    // Fungsi Mematikan GPS Palsu dan mengembalikan ke GPS asli HP
    function stopFakeGPS() {
        if (window.cordova && cordova.plugins && cordova.plugins.mockLocation) {
            // Kita set koordinat kosong atau hapus mock provider
            location.reload(); // Cara paling aman membersihkan cache mock pada Cordova
        } else {
            location.reload();
        }
        alert("Fake GPS dinonaktifkan. Mengembalikan koordinat ke GPS asli.");
    }
</script>
</body>
</html>
